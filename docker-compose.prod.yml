version: "3.8"

x-shared: &shared
  networks:
    - openbron-net
  restart: unless-stopped

services:
  traefik:
    <<: *shared
    image: traefik:v3.1
    container_name: openbron-traefik
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/acme/acme.json
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json"
    labels:
      - "traefik.http.middlewares.ssl-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.ssl-redirect.redirectscheme.permanent=true"
      - "traefik.http.middlewares.rate-limit.ratelimit.average=100"
      - "traefik.http.middlewares.rate-limit.ratelimit.burst=50"
      - "traefik.http.middlewares.secure-headers.headers.hstsmaxage=31536000"
      - "traefik.http.middlewares.secure-headers.headers.hstsincludeSubdomains=true"
      - "traefik.http.middlewares.secure-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.secure-headers.headers.xFrameOptions=SAMEORIGIN"
      - "traefik.http.middlewares.secure-headers.headers.contentSecurityPolicy=default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:; font-src 'self' data:"
      - "traefik.http.middlewares.secure-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.gzip.compress=true"
      - "traefik.http.middlewares.cors-headers.headers.accesscontrolallowmethods=GET,POST,PUT,PATCH,DELETE,OPTIONS"
      - "traefik.http.middlewares.cors-headers.headers.accesscontrolalloworigin=*"
      - "traefik.http.middlewares.cors-headers.headers.accesscontrolallowheaders=Authorization,Content-Type,X-Requested-With"
      - "traefik.http.middlewares.cors-headers.headers.accesscontrolmaxage=100"
      - "traefik.http.middlewares.cors-headers.headers.addvaryheader=true"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  db:
    <<: *shared
    image: pgvector/pgvector:pg16
    container_name: openbron-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 512M
          cpus: "0.5"

  redis:
    <<: *shared
    image: redis:7-alpine
    container_name: openbron-redis
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  nextjs-app:
    <<: *shared
    image: ${DOCKER_REGISTRY}/openbron-nextjs:${IMAGE_TAG:-latest}
    container_name: openbron-nextjs
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_ENDPOINT: ${LLM_ENDPOINT:-https://api.openai.com/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      NODE_ENV: production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextjs.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.nextjs.entrypoints=web"
      - "traefik.http.routers.nextjs.middlewares=ssl-redirect"
      - "traefik.http.routers.nextjs-secure.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.nextjs-secure.entrypoints=websecure"
      - "traefik.http.routers.nextjs-secure.tls=true"
      - "traefik.http.routers.nextjs-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nextjs-secure.middlewares=rate-limit,secure-headers,gzip,cors-headers"
      - "traefik.http.services.nextjs.loadbalancer.server.port=3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"

  celery-worker:
    <<: *shared
    image: ${DOCKER_REGISTRY}/openbron-backend:${IMAGE_TAG:-latest}
    container_name: openbron-celery-worker
    command: >
      celery -A app.tasks worker
      --loglevel=INFO
      --concurrency=${CELERY_WORKER_CONCURRENCY:-4}
      --max-tasks-per-child=50
      --events
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PROXY_URL: ${PROXY_URL}
      TESSERACT_PATH: /usr/bin/tesseract
      OPENCV_THREADS: "4"
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-noreply@openbron.local}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    volumes:
      - ocrdata:/tmp/ocr
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4"
        reservations:
          memory: 1G
          cpus: "1"

  celery-beat:
    <<: *shared
    image: ${DOCKER_REGISTRY}/openbron-backend:${IMAGE_TAG:-latest}
    container_name: openbron-celery-beat
    command: >
      celery -A app.tasks beat
      --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  pgdata:
  redisdata:
  ocrdata:

networks:
  openbron-net:
    driver: bridge
